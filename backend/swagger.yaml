openapi: 3.0.3
info:
  title: Primetrade Task Manager API
  description: |
    A production-quality REST API with JWT authentication, role-based access control,
    and full CRUD operations on Tasks.
    
    ## Authentication
    All protected endpoints require a Bearer JWT token in the `Authorization` header:
    ```
    Authorization: Bearer <your_token>
    ```
    
    ## Roles
    - **user** – Can manage own tasks
    - **admin** – Can manage all tasks and users
  version: 1.0.0
  contact:
    name: Primetrade API Support
    email: api@primetrade.ai

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          example: "jane@example.com"
        role:
          type: string
          enum: [user, admin]
          example: "user"
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        title:
          type: string
          example: "Build REST API"
        description:
          type: string
          example: "Implement CRUD endpoints with JWT auth"
        status:
          type: string
          enum: [todo, in-progress, done]
          example: "todo"
        priority:
          type: string
          enum: [low, medium, high]
          example: "high"
        dueDate:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            type: string
          example: ["backend", "api"]
        owner:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Login successful"
        data:
          type: object
          properties:
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            user:
              $ref: '#/components/schemas/User'

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 42
        pages:
          type: integer
          example: 5

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "Jane Doe"
                email:
                  type: string
                  example: "jane@example.com"
                password:
                  type: string
                  example: "Secret1234"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "jane@example.com"
                password:
                  type: string
                  example: "Secret1234"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks (own tasks for users, all tasks for admins)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [todo, in-progress, done]
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: sortBy
          schema:
            type: string
            default: createdAt
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of tasks with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      tasks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Task'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized

    post:
      tags: [Tasks]
      summary: Create a new task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: "Design database schema"
                description:
                  type: string
                  example: "Draft ERD and Mongoose models"
                status:
                  type: string
                  enum: [todo, in-progress, done]
                  default: todo
                priority:
                  type: string
                  enum: [low, medium, high]
                  default: medium
                dueDate:
                  type: string
                  format: date-time
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '422':
          description: Validation error

  /tasks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Task ID

    get:
      tags: [Tasks]
      summary: Get a single task
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '404':
          description: Task not found

    put:
      tags: [Tasks]
      summary: Update a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [todo, in-progress, done]
                priority:
                  type: string
                  enum: [low, medium, high]
                dueDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Task updated
        '401':
          description: Unauthorized
        '404':
          description: Task not found

    delete:
      tags: [Tasks]
      summary: Delete a task
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task deleted
        '401':
          description: Unauthorized
        '404':
          description: Task not found

  /admin/users:
    get:
      tags: [Admin]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated user list
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – admin only

  /admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Update a user's role (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [user, admin]
      responses:
        '200':
          description: Role updated
        '400':
          description: Invalid role
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found

  /admin/users/{id}/deactivate:
    patch:
      tags: [Admin]
      summary: Deactivate a user account (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deactivated
        '400':
          description: Cannot deactivate self
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /admin/stats:
    get:
      tags: [Admin]
      summary: Get platform statistics (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Platform stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalUsers:
                        type: integer
                      totalTasks:
                        type: integer
                      tasksByStatus:
                        type: object
                        properties:
                          todo:
                            type: integer
                          in-progress:
                            type: integer
                          done:
                            type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
